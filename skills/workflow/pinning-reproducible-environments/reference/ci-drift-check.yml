# Example GitHub Actions workflow — weekly lockfile drift check
# Adapt the ecosystem-specific steps to whichever lockfile your project uses.
# This file is reference material, not an active workflow; copy into
# `.github/workflows/lockfile-drift-check.yml` in the target repo.

name: Lockfile drift check (weekly)

on:
  schedule:
    # Mondays 09:00 UTC
    - cron: "0 9 * * 1"
  workflow_dispatch:

jobs:
  python-uv-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.0"  # pin the tool itself

      - name: Re-lock against latest compatible versions
        run: |
          cp uv.lock uv.lock.committed
          uv lock --upgrade

      - name: Detect drift
        id: drift
        run: |
          if diff -q uv.lock uv.lock.committed > /dev/null; then
            echo "drifted=false" >> $GITHUB_OUTPUT
          else
            echo "drifted=true" >> $GITHUB_OUTPUT
            diff uv.lock.committed uv.lock > drift.patch || true
          fi

      - name: Open PR if drifted
        if: steps.drift.outputs.drifted == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: deps/weekly-lock-refresh
          title: "deps: weekly lockfile refresh"
          body: |
            Weekly lockfile drift check ran `uv lock --upgrade` and found
            updates available. Review the diff and merge if appropriate.

            See `drift.patch` artifact for the full diff.
          add-paths: uv.lock
          commit-message: "deps: refresh uv.lock"

  node-npm-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Re-resolve against latest compatible versions
        run: |
          cp package-lock.json package-lock.json.committed
          npm update --package-lock-only

      - name: Detect drift
        id: drift
        run: |
          if diff -q package-lock.json package-lock.json.committed > /dev/null; then
            echo "drifted=false" >> $GITHUB_OUTPUT
          else
            echo "drifted=true" >> $GITHUB_OUTPUT
          fi

      - name: Open PR if drifted
        if: steps.drift.outputs.drifted == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: deps/weekly-npm-refresh
          title: "deps: weekly package-lock.json refresh"
          body: |
            Weekly drift check ran `npm update --package-lock-only` and found
            updates available. Review the diff and merge if appropriate.
          add-paths: package-lock.json
          commit-message: "deps: refresh package-lock.json"
