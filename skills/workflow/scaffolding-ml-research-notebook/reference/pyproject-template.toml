# pyproject-template.toml — used by scaffolding-ml-research-notebook
# Substitute <pkg> / <project_name> / ml_stack block as appropriate.

[project]
name = "<project_name>"
version = "0.1.0"
description = "<one-line description>"
readme = "README.md"
requires-python = "==3.13.*"
dependencies = [
    "numpy~=2.1",
    "pandas~=2.2",
    "jupyterlab~=4.2",
    # ----- ml_stack block (uncomment ONE) -----
    # sklearn:
    "scikit-learn~=1.5",
    # pytorch:
    # "torch~=2.5",
    # jax:
    # "jax~=0.4",
    # tensorflow:
    # "tensorflow~=2.18",
]

[project.optional-dependencies]
dev = [
    "pytest~=8.3",
    "pytest-mock~=3.15",
    "ruff~=0.7",
    "mypy~=1.13",
    "nbstripout~=0.7",
    "pre-commit~=4.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/<pkg>"]

[tool.ruff]
line-length = 100
target-version = "py313"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "W", "N", "UP"]

[tool.mypy]
python_version = "3.13"
strict = true
files = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra -q"
